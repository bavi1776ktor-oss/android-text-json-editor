pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id("com.facebook.react.settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { settings ->
    settings.autolinkLibrariesWithApp()
}

rootProject.name = "my-text-editor"

include ':app'
project(':app').projectDir = new File(rootProject.projectDir, 'app')
